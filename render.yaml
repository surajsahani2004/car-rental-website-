services:
  - type: web
    name: safar-suvidha
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: safar-suvidha-db
          property: connectionString

databases:
  - name: safar-suvidha-db
    plan: free
